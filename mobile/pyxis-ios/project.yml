# XcodeGen spec — a reliable fallback for regenerating Pyxis.xcodeproj.
#
# The committed Pyxis.xcodeproj should open and build directly in Xcode 16+.
# If you prefer to regenerate it from scratch (or hit any project-file issue),
# install XcodeGen (`brew install xcodegen`) and run `xcodegen generate` from
# this directory to produce an equivalent project from the same source tree.

name: Pyxis
options:
  bundleIdPrefix: com.pyxis
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Pyxis:
    type: application
    platform: iOS
    sources:
      - path: Pyxis
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Pyxis/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.pyxis.compliance
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES

  PyxisTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PyxisTests
    dependencies:
      - target: Pyxis
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pyxis.compliance.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Pyxis:
    build:
      targets:
        Pyxis: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PyxisTests
