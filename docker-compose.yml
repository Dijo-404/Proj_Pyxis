services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pyxis
      POSTGRES_USER: pyxis
      POSTGRES_PASSWORD: pyxis_dev_only
    ports:
      - "5432:5432"
    volumes:
      - pyxis_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pyxis -d pyxis"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pyxis_postgres_data:
